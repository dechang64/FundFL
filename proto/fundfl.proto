syntax = "proto3";
package fundfl;

// 基金查询服务
service FundService {
  // 获取基金基本信息
  rpc GetFund(GetFundRequest) returns (FundInfo);
  // 获取基金风险指标
  rpc GetRiskMetrics(GetRiskRequest) returns (RiskMetrics);
  // 搜索相似基金（向量检索）
  rpc SearchSimilar(SearchRequest) returns (SearchResponse);
  // 获取基金列表（分页）
  rpc ListFunds(ListFundsRequest) returns (ListFundsResponse);
  // 获取数据库统计
  rpc GetStats(StatsRequest) returns (StatsResponse);
}

// 向量操作服务
service VectorService {
  rpc Insert(InsertRequest) returns (InsertResponse);
  rpc Search(VectorSearchRequest) returns (VectorSearchResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

// 审计服务
service AuditService {
  rpc GetLog(LogRequest) returns (LogResponse);
  rpc VerifyChain(VerifyRequest) returns (VerifyResponse);
}

// ===== 消息定义 =====

message GetFundRequest {
  string fund_code = 1;
}

message FundInfo {
  string code = 1;
  string name = 2;
  string category = 3;
  string category_cn = 4;
  string manager = 5;
  string company = 6;
  double nav = 7;
  double acc_nav = 8;
  int32 data_months = 9;
}

message GetRiskRequest {
  string fund_code = 1;
  string period = 2;  // "all", "1y", "3y", "5y"
}

message RiskMetrics {
  string fund_code = 1;
  double ann_return = 2;
  double ann_vol = 3;
  double sharpe = 4;
  double sortino = 5;
  double max_drawdown = 6;
  double beta = 7;
  double alpha = 8;
  double treynor = 9;
  double info_ratio = 10;
  double calmar = 11;
  double var_95 = 12;
  double cvar_95 = 13;
  double m2 = 14;
  double skewness = 15;
  double kurtosis = 16;
  double win_rate = 17;
}

message SearchRequest {
  string fund_code = 1;   // 基于基金代码搜索相似基金
  int32 top_k = 2;        // 返回Top-K结果，默认5
  string category_filter = 3;  // 可选：同类过滤
}

message SearchResponse {
  repeated SimilarFund results = 1;
}

message SimilarFund {
  string code = 1;
  string name = 2;
  string category = 3;
  double distance = 4;    // 向量距离（越小越相似）
  double similarity = 5;  // 相似度（0-1，越大越相似）
  RiskMetrics risk = 6;   // 对方风险指标
}

message ListFundsRequest {
  string category = 1;    // 可选：按类别筛选
  string sort_by = 2;     // 排序字段：sharpe/alpha/return/drawdown
  string sort_order = 3;  // asc/desc
  int32 page = 4;
  int32 page_size = 5;
}

message ListFundsResponse {
  repeated FundInfo funds = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message StatsRequest {}

message StatsResponse {
  int64 total_funds = 1;
  int64 total_vectors = 2;
  int32 vector_dimension = 3;
  repeated CategoryStats categories = 4;
  int64 audit_chain_length = 5;
  bool audit_chain_valid = 6;
}

message CategoryStats {
  string category = 1;
  string category_cn = 2;
  int64 count = 3;
  double avg_sharpe = 4;
  double avg_alpha = 5;
}

// Vector messages
message VectorEntry {
  string id = 1;
  repeated float values = 2;
  map<string, string> metadata = 3;
}

message InsertRequest {
  repeated VectorEntry vectors = 1;
}

message InsertResponse {
  int32 inserted = 1;
}

message VectorSearchRequest {
  repeated float query = 1;
  int32 k = 2;
}

message VectorSearchResponse {
  repeated VectorSearchResult results = 1;
}

message VectorSearchResult {
  string id = 1;
  float distance = 2;
  map<string, string> metadata = 3;
}

message DeleteRequest {
  repeated string ids = 1;
}

message DeleteResponse {
  int32 deleted = 1;
}

// Audit messages
message LogRequest {
  int32 limit = 1;
  string operation_type = 2;  // 可选过滤
}

message LogResponse {
  repeated AuditEntry entries = 1;
}

message AuditEntry {
  int64 index = 1;
  string timestamp = 2;
  string operation = 3;
  string hash = 4;
}

message VerifyRequest {}

message VerifyResponse {
  bool valid = 1;
  int64 chain_length = 2;
  string latest_hash = 3;
}
